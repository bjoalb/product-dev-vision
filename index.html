<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systemised Operations for Digital Product Development</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1a1a1a}
#app{display:flex;flex-direction:column;height:100vh}
.header{background:#000;color:#fff;padding:16px 32px;display:flex;align-items:center;gap:24px;height:60px;flex-shrink:0}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:13px;opacity:.7;margin-top:2px}
.header-tabs{display:flex;gap:4px;background:rgba(255,255,255,.06);padding:4px;border-radius:8px}
.header-logo{margin-left:auto;display:flex;align-items:center}
.header-logo svg{height:20px;width:auto}
.version-badge{font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:4px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.25);font-family:monospace}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #d1d5db;background:#fff;font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{background:#f1f5f9}
.btn.active{background:#000;color:#fff;border-color:#000}
.tab-btn{padding:7px 16px;border-radius:6px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.tab-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}
.tab-btn.active{background:rgba(255,255,255,.15);color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;border-right:1px solid #e2e8f0;overflow-y:auto;background:#fff;flex-shrink:0}
.sidebar .group-header{padding:16px 16px 4px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;cursor:default;border-bottom:none;margin-top:4px}
.sidebar .group-header:first-child{margin-top:0}
.sidebar h3{padding:8px 16px;font-size:13px;color:#1a1a1a;letter-spacing:0;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.sidebar h3:hover{background:#f8fafc}
.sidebar h3 .chevron{font-size:10px;transition:transform .15s;color:#94a3b8}
.badge.external{background:#f1f5f9;color:#475569;font-size:10px}
.badge.internal{background:#f1f5f9;color:#475569;font-size:10px}
.shared-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:#f1f5f9;color:#475569;margin-left:6px}
.sidebar-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;border-bottom:1px solid #f8fafc;transition:background .1s}
.sidebar-item:hover{background:#f1f5f9}
.sidebar-item.selected{background:#eef2ff;border-left:3px solid #1e2761}
.sidebar-item .icon{display:none}
.sidebar-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .count{font-size:11px;color:#94a3b8;background:#f1f5f9;padding:2px 6px;border-radius:4px}
.canvas{flex:1;overflow:auto;padding:32px;position:relative}
.detail-panel{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:24px;max-width:800px}
.detail-panel h2{font-size:20px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.detail-panel .subtitle{color:#64748b;font-size:13px;margin-bottom:16px}
.detail-panel .description{color:#334155;font-size:14px;line-height:1.6;margin-bottom:16px}
.section-label{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px}
.dep-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.dep-chip{padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.dep-chip:hover{transform:translateY(-1px);box-shadow:0 2px 4px rgba(0,0,0,.1)}
.dep-chip.specialist{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
.dep-chip.tool{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
.dep-chip.knowledge{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
.dep-chip.shared{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
.dep-chip.playbook{background:#f1f5f9;color:#334155;border:1px solid #cbd5e1}
.dep-chip.tooldep{background:#f1f5f9;color:#334155;border:2px dashed #cbd5e1}
.sub-agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:12px}
.sub-agent-card{padding:8px 12px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;font-size:12px}
.sub-agent-card .sa-title{font-weight:600;display:flex;align-items:center;gap:4px;margin-bottom:2px}
.sub-agent-card .sa-desc{color:#64748b;font-size:11px;line-height:1.4}
.kb-items{display:flex;flex-wrap:wrap;gap:4px}
.kb-item{padding:3px 8px;background:#f1f5f9;border-radius:4px;font-size:11px;color:#475569}
.empty-state{text-align:center;padding:80px 32px;color:#94a3b8}
.empty-state h3{font-size:18px;margin-bottom:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.human{background:#f1f5f9;color:#475569}
.badge.agent{background:#e8e8e8;color:#1a1a1a}
.badge.dual{background:#f1f5f9;color:#475569}
.deps-from{margin-top:16px}
.deps-from .section-label{color:#94a3b8}
@media(max-width:768px){.main{flex-direction:column;flex:1}.sidebar{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid #e2e8f0}}
.view-sep{display:inline-block;width:1px;height:18px;background:#e2e8f0;margin:0 8px;vertical-align:middle}
.process-outer{flex:1;overflow:auto;background:#f8fafc;padding:24px 0 0 0}
.process-table{border-collapse:collapse;font-size:12px}
.process-table th,.process-table td{border:1px solid #e2e8f0;padding:10px 12px;vertical-align:top}
.pt-phase-header{color:#fff;text-align:center;font-weight:700;font-size:13px;position:sticky;top:0;z-index:10;min-width:200px}
.pt-corner{position:sticky;top:0;left:0;z-index:20;background:#f8fafc;width:160px;min-width:160px;border:1px solid #e2e8f0 !important}
.pt-row-label{background:#fff !important;font-weight:700;font-size:12px;color:#1a1a1a;position:sticky;left:0;z-index:5;width:160px;min-width:160px;white-space:nowrap;cursor:pointer;user-select:none;border-right:2px solid #e2e8f0 !important;transition:background .1s}
.pt-row-label-content{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pt-row-label:hover{background:#f1f5f9 !important}
.pt-row-label .chevron{font-size:10px;color:#94a3b8;flex-shrink:0}
.pt-row-label.collapsed{background:#f8fafc !important;color:#64748b;font-weight:600}
.pt-row-collapsed-filler{background:#f8fafc;border:1px solid #e2e8f0}
.pt-cell-text{color:#334155;line-height:1.5;font-size:12px;margin:0 0 4px}
.pt-cell-items{margin:0;padding:0 0 0 14px;color:#334155;line-height:1.65;font-size:12px}
.pt-cell-items li{margin-bottom:2px}
.pt-phase-header{cursor:pointer;user-select:none}
.pt-phase-header:hover{opacity:.85}
.pt-collapsed-header{background:#475569;color:#fff;width:32px;min-width:32px;max-width:32px;cursor:pointer;user-select:none;position:sticky;top:0;z-index:10;padding:0;border:1px solid #e2e8f0}
.pt-collapsed-header:hover{opacity:.85}
.pt-collapsed-label{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-weight:700;font-size:12px;padding:12px 4px;white-space:nowrap}
.pt-collapsed-cell{width:32px;min-width:32px;max-width:32px;background:#f1f5f9;border:1px solid #e2e8f0}
.page-footer{padding:12px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:16px;align-items:center;font-size:11px;color:#94a3b8;flex-shrink:0}
.page-footer a{color:#64748b;text-decoration:none;transition:color .15s}
.page-footer a:hover{color:#1e2761;text-decoration:underline}
.page-footer .sep{width:1px;height:12px;background:#e2e8f0}
.maturity-badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-left:6px}
.maturity-badge.production{background:#e8e8e8;color:#1a1a1a}
.maturity-badge.first-version{background:#f1f5f9;color:#475569}
.maturity-badge.poc{background:#f1f5f9;color:#475569}
.maturity-badge.explored{background:#f1f5f9;color:#475569}
.maturity-badge.concept{background:#f1f5f9;color:#64748b}
.domain-tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500;background:#f1f5f9;color:#475569;margin-left:6px}
/* Search */
.search-bar{padding:16px 32px 0;position:relative;max-width:400px;flex-shrink:0}
.search-input-wrap{position:relative;display:flex;align-items:center}
.search-input-wrap input{width:100%;padding:8px 32px 8px 32px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;outline:none;transition:border .15s,box-shadow .15s}
.search-input-wrap input:focus{border-color:#000;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.search-input-wrap input::placeholder{color:#94a3b8}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;pointer-events:none}
.search-icon::before{content:'';display:block;width:10px;height:10px;border:2px solid #94a3b8;border-radius:50%}
.search-icon::after{content:'';display:block;width:6px;height:2px;background:#94a3b8;transform:rotate(45deg);position:relative;top:-2px;left:9px}
.search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px;display:none}
.search-clear:hover{color:#475569;background:#f1f5f9}
.search-dropdown{position:absolute;top:100%;left:0;right:0;max-height:400px;overflow-y:auto;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;margin-top:4px;display:none}
.search-dropdown.open{display:block}
.search-group-label{padding:8px 12px 4px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;background:#f8fafc;position:sticky;top:0}
.search-result{padding:8px 12px;cursor:pointer;display:flex;flex-direction:column;gap:1px;border-bottom:1px solid #f8fafc;transition:background .1s}
.search-result:hover,.search-result.active{background:#eef2ff}
.search-result .sr-title{font-size:13px;font-weight:500;color:#1a1a1a}
.search-result .sr-title mark{background:#fef08a;color:inherit;border-radius:2px;padding:0 1px}
.search-result .sr-context{font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result .sr-context mark{background:#fef08a;color:#64748b;border-radius:2px;padding:0 1px}
.search-empty{padding:16px 12px;text-align:center;color:#94a3b8;font-size:13px}
.search-hint{padding:8px 12px;font-size:11px;color:#94a3b8;text-align:center;border-top:1px solid #f1f5f9}
/* Architecture Map */
.map-outer{overflow-y:auto;flex:1;background:#f8fafc;padding:32px 32px 0}
.map-picker{max-width:1200px;margin:0 auto}
.map-picker-title{font-size:26px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:4px}
.map-picker-subtitle{font-size:14px;color:#64748b;text-align:center;margin-bottom:32px}
.map-picker-stages{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px}
.map-picker-stage{}
.map-picker-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:7px 12px;border-radius:8px;color:#fff;text-align:center;margin-bottom:10px}
.map-picker-card{padding:12px 14px;border-radius:8px;background:#fff;border:1px solid #e2e8f0;cursor:pointer;transition:all .2s;margin-bottom:8px;position:relative}
.map-picker-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:#cbd5e1}
.map-picker-card .pc-title{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.3}
.map-picker-card .pc-domain{font-size:10px;color:#94a3b8;margin-top:3px;line-height:1.3}
.map-picker-card .pc-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:10px 0 0 10px}
.map-crosscut{margin-top:8px;padding-top:20px;border-top:2px dashed #cbd5e1}
.map-crosscut-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;text-align:center;margin-bottom:12px}
.map-crosscut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.map-flow{max-width:900px;margin:0 auto;padding-bottom:48px}
.map-back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:500;color:#475569;cursor:pointer;transition:all .15s;margin-bottom:24px}
.map-back-btn:hover{background:#f1f5f9;color:#1e2761;border-color:#cbd5e1}
.map-flow-band{margin-bottom:0;text-align:center}
.map-flow-band-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:8px}
.map-flow-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:16px 20px;border-radius:12px}
.map-flow-card{padding:12px 16px;border-radius:10px;background:#fff;border:1px solid #e2e8f0;cursor:pointer;transition:all .2s;text-align:left;display:flex;flex-direction:column}
.map-flow-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:#cbd5e1}
.map-flow-card .fc-title{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.3}
.map-flow-card .fc-sub{font-size:10px;color:#64748b;margin-top:3px;line-height:1.3;flex:1}
.map-flow-card.fc-expanded{border-color:#000;box-shadow:0 4px 16px rgba(0,0,0,.1);grid-column:span 2}
.map-flow-card .fc-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0;font-size:12px;color:#475569;line-height:1.5}
.map-flow-card.fc-expanded .fc-detail{display:block}
.map-flow-card .fc-detail-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.map-flow-card .fc-detail-chip{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:#f1f5f9;color:#475569}
.map-flow-card-expanded{padding:20px 24px;border-radius:14px;background:#fff;border:2px solid #1e2761;box-shadow:0 4px 20px rgba(30,39,97,.12);text-align:left}
.map-flow-card-expanded .fce-title{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.map-flow-card-expanded .fce-desc{font-size:14px;color:#475569;line-height:1.6}
.map-flow-card-expanded .fce-domain{font-size:11px;color:#94a3b8;margin-top:6px;font-weight:500}
.map-flow-connector{display:flex;flex-direction:column;align-items:center;padding:6px 0}
.map-flow-connector .connector-line{width:2px;height:12px;background:#cbd5e1}
.map-flow-connector .connector-text{font-size:11px;color:#94a3b8;font-style:italic;padding:2px 0}
/* View Controls */
.view-controls{display:flex;align-items:center;gap:12px;padding:6px 32px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.compact-active .page-footer{display:none}
.view-control-group{display:flex;align-items:center;gap:6px}
.view-control-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.density-toggle{display:flex;gap:2px;background:#f1f5f9;padding:2px;border-radius:6px}
.density-btn{padding:4px 12px;border-radius:4px;border:none;background:transparent;font-size:11px;font-weight:600;color:#64748b;cursor:pointer;transition:all .15s}
.density-btn:hover{color:#1a1a1a}
.density-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 2px rgba(0,0,0,.08)}
/* Compact mode overrides */
.compact{padding:12px 16px 0}
.compact .map-picker{max-width:100%}
.compact .map-picker-title{font-size:14px;margin-bottom:0}
.compact .map-picker-subtitle{font-size:10px;margin-bottom:6px}
.compact .map-picker-stages{gap:4px;margin-bottom:4px}
.compact .map-picker-header{padding:2px 6px;font-size:8px;margin-bottom:2px;border-radius:3px}
.compact .map-picker-card{padding:2px 6px 2px 10px;margin-bottom:2px;border-radius:3px}
.compact .map-picker-card .pc-title{font-size:9px}
.compact .map-picker-card .pc-domain{display:none}
.compact .map-picker-card .pc-accent{width:2px}
.compact .map-flow-connector{padding:0}
.compact .map-flow-connector .connector-line{height:3px}
.compact .map-flow-connector .connector-text{font-size:8px;padding:0}
.compact .map-flow-band-label{font-size:7px;margin-bottom:2px;letter-spacing:.08em}
.compact .map-flow-cards{gap:3px;padding:4px 6px;border-radius:4px;grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
.compact .map-flow-card{padding:2px 6px;border-radius:3px}
.compact .map-flow-card .fc-title{font-size:8px;line-height:1.2}
.compact .map-flow-card .fc-sub{display:none}
.compact .map-flow-card.fc-gov-sub .fc-sub{display:block;font-size:7px;margin-top:0;line-height:1.1}
.compact .map-crosscut{padding-top:4px;margin-top:2px}
@media(max-width:960px){.map-picker-stages{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.map-picker-stages{grid-template-columns:1fr 1fr}.map-crosscut-grid{grid-template-columns:1fr}.map-flow-cards{grid-template-columns:1fr}.map-outer{padding:16px}}
@media(max-width:480px){.map-picker-stages{grid-template-columns:1fr}}
/* Rating Bar */
.rating-bar{display:flex;gap:16px;margin:8px 0 16px;padding:10px 14px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
.rating-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#475569}
.rating-label{font-weight:600;color:#64748b;text-transform:uppercase;font-size:10px;letter-spacing:.04em}
.rating-dots{display:flex;gap:3px}
.rating-dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;transition:background .15s}
.rating-dot.filled{background:#1a1a1a}
.rating-value{font-weight:700;font-size:11px;color:#1a1a1a;min-width:14px;text-align:right}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script>
const VERSION = 'PA03';

const PROCESS_DATA = {
  rows:[
    {key:'challenges',label:'Challenges'},
    {key:'objective',label:'Objective'},
    {key:'context',label:'Context'},
    {key:'resources',label:'Resources'},
    {key:'activities',label:'Activities'},
    {key:'inputs',label:'Inputs'},
    {key:'outputs',label:'Outputs'}
  ],
  phases:[
    {
      id:'capture',title:'Capture',icon:'',headerColor:'#1a1a1a',bgColor:'#e8e8e8',
      objective:'Identify meaningful opportunities with potential user and brand impact early in the process.',
      horizon:'Later',focus:'Identify Opportunity',
      activities:['Stakeholder mapping','Market and competitor analysis','Data analytics review','Discovery workshops and journey mapping','Prioritisation based on user impact, business value, and feasibility'],
      inputs:['Customer insights and feedback','Existing analytics and usage patterns','Business needs and strategic goals','Tech limitations and platform capabilities','Top management directives'],
      outputs:['Opportunity areas','Customer pain points','Initial hypotheses and assumptions','Strategic fit and stakeholder interest'],
      resources:['Product Vision','Research Framework','Digital Experience Strategy'],
      context:{text:'Identify opportunities rooted in user need, market signal, or platform/foundation.',items:['Helps avoid local solutions to global problems','Reduces backlog noise by anchoring ideas in evidence','Gives teams a place to flag UX, UI, and brand opportunities early']},
      challenges:['UX/UI concerns discovered too late','Backlog items not prioritised from a user or design quality perspective','Fragmented insight stored in private folders/files','Underutilisation of data, insights and knowledge when planning and scoping','Unclear documentation']
    },
    {
      id:'define',title:'Define',icon:'',headerColor:'#333333',bgColor:'#ededed',
      objective:'Understand the problem in full by combining user research, system insight, and branch/UX evaluation.',
      horizon:'Later',focus:'Problem Research \u2192 Problem Definition',
      activities:['Cross-functional alignment on product scope and goals','User interviews and feedback collection','Setting user personas and customer journeys','Defining success metrics','Prioritise features'],
      inputs:['Findings from research','User personas','Business frameworks (e.g. Digital Experience Strategy)','Roadmap dependencies'],
      outputs:['Clear product vision and scope','Business cases and success metrics','Defined problem statements and vision','Hypotheses','Personas','Customer journeys','Prioritised backlog'],

  DATA.guardrails.forEach(g => idx.push({id:g.id, navId:'guardrail-'+g.id, type:'Guardrail', title:g.title, text:(g.subtitle||'')+' '+(g.description||'')}));

  // Pre-compute lowercase
  idx.forEach(e => { e._title = e.title.toLowerCase(); e._text = e.text.toLowerCase(); });
  return idx;
}
const SEARCH_INDEX = buildSearchIndex();

function searchEntities(query) {
  if (!query || query.length < 2) return [];
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const scored = [];
  SEARCH_INDEX.forEach(entry => {
    let score = 0;
    let allMatch = true;
    for (const t of terms) {
      const inTitle = entry._title.includes(t);
      const inText = entry._text.includes(t);
      if (!inTitle && !inText) { allMatch = false; break; }
      if (inTitle) score += 10;
      if (entry._title.startsWith(t)) score += 5;
      if (inText) score += 1;
    }
    if (allMatch) scored.push({entry, score});
  });
  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, 20).map(s => s.entry);
}

function highlightMatch(text, query) {
  if (!query || query.length < 2) return esc(text);
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  let result = esc(text);
  terms.forEach(t => {
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

function findContextSnippet(text, query) {
  if (!text || !query) return '';
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const lower = text.toLowerCase();
  for (const t of terms) {
    const idx = lower.indexOf(t);
    if (idx >= 0) {
      const start = Math.max(0, idx - 20);
      const end = Math.min(text.length, idx + t.length + 40);
      return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
    }
  }
  return text.length > 60 ? text.slice(0,60) + '…' : text;
}

function findItem(id) {
  const [prefix, ...rest] = id.split('-');
  const rawId = rest.join('-');
  if (prefix === 'cap') return DATA.capabilities.find(x => x.id === id);
  if (prefix === 'ka') return DATA.knowledgeAssets.find(x => x.id === id);
  if (prefix === 'agent') return DATA.aiAgents.find(x => x.id === rawId);
  if (prefix === 'skill') return DATA.skills.find(x => x.id === rawId);
  if (prefix === 'guideline') return DATA.guidelines.find(x => x.id === rawId);
  if (prefix === 'pb') return DATA.playbooks.find(x => x.id === rawId);
  if (prefix === 'policy') return DATA.policies.find(x => x.id === rawId);
  if (prefix === 'guardrail') return DATA.guardrails.find(x => x.id === rawId);
  if (prefix === 'realtool') return DATA.realtools.find(x => x.id === rawId);
  if (prefix === 'infra') return DATA.infrastructure.find(x => x.id === rawId);
  return null;
}

/* ── Architecture Map ── */
const STAGE_COLORS = {discover:'#1a1a1a',build:'#333333',run:'#4d4d4d',evolve:'#666666',migrate:'#808080',sunset:'#999999','cross-cutting':'#707070'};

function buildFlowData(capId) {
  const cap = DATA.capabilities.find(c => c.id === capId);
  if (!cap) return null;

  // Playbooks
  const playbooks = (cap.playbooks||[]).map(id => DATA.playbooks.find(p => p.id === id)).filter(Boolean);

  // Agents: union of playbook agents + cap.keyAgents, deduplicated
  const agentIdSet = new Set(cap.keyAgents||[]);
  playbooks.forEach(pb => (pb.aiAgents||[]).forEach(id => agentIdSet.add(id)));
  const agents = [...agentIdSet].map(id => DATA.aiAgents.find(a => a.id === id)).filter(Boolean);

  // Skills: union of agent skillChains + cap.keySkills, deduplicated
  const skillIdSet = new Set(cap.keySkills||[]);
  agents.forEach(a => (a.skillChain||[]).forEach(id => skillIdSet.add(id)));
  const skills = [...skillIdSet].map(id => DATA.skills.find(s => s.id === id)).filter(Boolean);

  // Tools: realtools where relatedSkills or relatedAgents overlap
  const tools = DATA.realtools.filter(t => {
    const tSkills = t.relatedSkills||[];
    const tAgents = t.relatedAgents||[];
    return tSkills.some(s => skillIdSet.has(s)) || tAgents.some(a => agentIdSet.has(a));
  });

  // Guidelines: union of all skill knowledgeDeps, deduplicated
  const guidelineIdSet = new Set();
  skills.forEach(sk => (sk.knowledgeDeps||[]).forEach(id => guidelineIdSet.add(id)));
  const guidelines = [...guidelineIdSet].map(id => DATA.guidelines.find(g => g.id === id)).filter(Boolean);

  // Rules: policies + guardrails where relatedCapabilities includes cap, OR relatedSkills overlap
  const governance = [];
  DATA.policies.forEach(p => {
    if ((p.relatedCapabilities||[]).includes(capId) || (p.relatedSkills||[]).some(s => skillIdSet.has(s))) {
      governance.push({type:'policy', item:p});
    }
  });
  DATA.guardrails.forEach(g => {
    if ((g.relatedCapabilities||[]).includes(capId) || (g.relatedSkills||[]).some(s => skillIdSet.has(s))) {
      governance.push({type:'guardrail', item:g});
    }
  });

  return {capability:cap, playbooks, agents, skills, tools, guidelines, governance};
}

function renderCardDetail(id) {
  const prefix = id.split('-')[0];
  const rawId = id.replace(/^[a-z]+-/, '');
  let html = '';
  if (prefix === 'pb') {
    const pb = DATA.playbooks.find(x => x.id === rawId);
    if (pb) {
      if (pb.description) html += '<p>' + esc(pb.description) + '</p>';
      if (pb.phases && pb.phases.length) html += '<p style="margin-top:4px;color:#94a3b8;font-size:11px">' + esc(pb.phases.join(' \u2192 ')) + '</p>';
      if (pb.aiAgents && pb.aiAgents.length) {
        html += '<div class="fc-detail-chips">';
        pb.aiAgents.forEach(aId => { const a = DATA.aiAgents.find(x=>x.id===aId); html += '<span class="fc-detail-chip">' + (a?esc(a.title):aId) + '</span>'; });
        html += '</div>';
      }
    }
  } else if (prefix === 'agent') {
    const a = DATA.aiAgents.find(x => x.id === rawId);
    if (a) {
      if (a.subtitle) html += '<p>' + esc(a.subtitle) + '</p>';
      if (a.definitionOfDone) html += '<p style="margin-top:4px;font-style:italic;color:#94a3b8">' + esc(a.definitionOfDone) + '</p>';
      if (a.skillChain && a.skillChain.length) {
        html += '<div class="fc-detail-chips">';
        a.skillChain.slice(0,6).forEach(sId => { const sk = DATA.skills.find(x=>x.id===sId); html += '<span class="fc-detail-chip">' + (sk?esc(sk.title):sId) + '</span>'; });
        if (a.skillChain.length > 6) html += '<span class="fc-detail-chip">+' + (a.skillChain.length-6) + ' more</span>';
        html += '</div>';
      }
    }
  } else if (prefix === 'skill') {
    const sk = DATA.skills.find(x => x.id === rawId);
    if (sk) {
      if (sk.description) html += '<p>' + esc(sk.description) + '</p>';
      const mat = sk.maturity || 'production';
      html += '<p style="margin-top:4px"><span class="maturity-badge ' + mat + '">' + mat.replace('-',' ') + '</span></p>';
      const kDeps = sk.knowledgeDeps||[];
      if (kDeps.length) {
        html += '<p style="margin-top:4px;font-size:11px;color:#94a3b8">Guidelines: ' + kDeps.map(kid => { const g = DATA.guidelines.find(x=>x.id===kid); return g ? esc(g.title) : kid; }).join(', ') + '</p>';
      }
    }
  } else if (prefix === 'realtool') {
    const t = DATA.realtools.find(x => x.id === rawId);
    if (t) {
      if (t.description) html += '<p>' + esc(t.description) + '</p>';
      const chips = [];
      (t.relatedSkills||[]).forEach(sId => { const sk = DATA.skills.find(x=>x.id===sId); if (sk) chips.push(esc(sk.title)); });
      (t.relatedAgents||[]).forEach(aId => { const a = DATA.aiAgents.find(x=>x.id===aId); if (a) chips.push(esc(a.title)); });
      if (chips.length) {
        html += '<div class="fc-detail-chips">';
        chips.forEach(c => { html += '<span class="fc-detail-chip">' + c + '</span>'; });
        html += '</div>';
      }
    }
  } else if (prefix === 'policy') {
    const p = DATA.policies.find(x => x.id === rawId);
    if (p) {
      html += '<p style="margin-bottom:4px"><span class="badge ' + (p.scope||'internal') + '">' + (p.scope||'internal') + '</span></p>';
      if (p.description) html += '<p>' + esc(p.description) + '</p>';
      const caps = (p.relatedCapabilities||[]).map(cId => { const c = DATA.capabilities.find(x=>x.id===cId); return c ? esc(c.title) : null; }).filter(Boolean);
      const sks = (p.relatedSkills||[]).map(sId => { const sk = DATA.skills.find(x=>x.id===sId); return sk ? esc(sk.title) : null; }).filter(Boolean);
      if (caps.length || sks.length) {
        html += '<div class="fc-detail-chips">';
        caps.forEach(c => { html += '<span class="fc-detail-chip">' + c + '</span>'; });
        sks.forEach(s => { html += '<span class="fc-detail-chip">' + s + '</span>'; });
        html += '</div>';
      }
    }
  } else if (prefix === 'guardrail') {
    const g = DATA.guardrails.find(x => x.id === rawId);
    if (g) {
      html += '<p style="margin-bottom:4px"><span class="badge ' + (g.scope||'internal') + '">' + (g.scope||'internal') + '</span></p>';
      if (g.description) html += '<p>' + esc(g.description) + '</p>';
      const caps = (g.relatedCapabilities||[]).map(cId => { const c = DATA.capabilities.find(x=>x.id===cId); return c ? esc(c.title) : null; }).filter(Boolean);
      const sks = (g.relatedSkills||[]).map(sId => { const sk = DATA.skills.find(x=>x.id===sId); return sk ? esc(sk.title) : null; }).filter(Boolean);
      if (caps.length || sks.length) {
        html += '<div class="fc-detail-chips">';
        caps.forEach(c => { html += '<span class="fc-detail-chip">' + c + '</span>'; });
        sks.forEach(s => { html += '<span class="fc-detail-chip">' + s + '</span>'; });
        html += '</div>';
      }
    }
  } else if (prefix === 'guideline') {
    const g = DATA.guidelines.find(x => x.id === rawId);
    if (g) {
      const items = g.items||[];
      if (items.length) {
        html += '<div class="fc-detail-chips">';
        items.forEach(item => { html += '<span class="fc-detail-chip">' + esc(typeof item === 'string' ? item : item.title||item.id) + '</span>'; });
        html += '</div>';
      }
      // Show which skills depend on this guideline
      const depSkills = DATA.skills.filter(sk => (sk.knowledgeDeps||[]).includes(rawId));
      if (depSkills.length) {
        html += '<p style="margin-top:6px;font-size:11px;color:#94a3b8">Used by: ' + depSkills.map(sk => esc(sk.title)).join(', ') + '</p>';
      }
    }
  }
  return html;
}

function renderMapPicker() {
  let html = '<div class="map-picker">';
  html += '<div class="map-picker-title">The Full System</div>';
  html += '<div class="map-picker-subtitle">Click a capability to see its activation flow</div>';

  // --- Capabilities by stage (including cross-cutting as a column) ---
  const stageOrder = ['discover','build','run','evolve','migrate','sunset','cross-cutting'];
  const stageCols = stageOrder.map(sId => {
    const stage = DATA.lifecycleStages.find(ls => ls.id === sId);
    const label = stage ? stage.title : 'Cross-cutting';
    const caps = DATA.capabilities.filter(c => c.stage === sId);
    const color = STAGE_COLORS[sId] || '#475569';
    return {label, caps, color};
  }).filter(x => x.caps.length > 0);
  const totalCaps = DATA.capabilities.length;

  html += '<div class="map-flow-band" style="margin-bottom:0">';
  html += '<div class="map-flow-band-label">Capabilities (' + totalCaps + ')</div>';
  html += '<div class="map-picker-stages">';
  stageCols.forEach(({label, caps, color}) => {
    html += '<div class="map-picker-stage">';
    html += '<div class="map-picker-header" style="background:' + color + '">' + esc(label) + ' (' + caps.length + ')</div>';
    caps.forEach(cap => {
      html += '<div class="map-picker-card" data-cap-pick="' + cap.id + '">';
      html += '<div class="pc-accent" style="background:' + color + '"></div>';
      html += '<div class="pc-title">' + esc(cap.title) + '</div>';
      if (cap.description) html += '<div class="pc-domain">' + esc(cap.description.length > 80 ? cap.description.slice(0,80) + '…' : cap.description) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div></div>';

  // --- Playbooks ---
  html += renderFlowConnector('activate');
  let pbCards = '';
  DATA.playbooks.slice().sort((a,b) => a.title.localeCompare(b.title)).forEach(pb => { pbCards += renderFlowCard('pb-' + pb.id, (pb.icon||'') + ' ' + pb.title, pb.description ? (pb.description.length > 60 ? pb.description.slice(0,60) + '…' : pb.description) : null); });
  html += renderFlowBand('Playbooks (' + DATA.playbooks.length + ')', pbCards, '#fff');

  // --- AI Agents ---
  html += renderFlowConnector('mobilize');
  let agentCards = '';
  DATA.aiAgents.slice().sort((a,b) => a.title.localeCompare(b.title)).forEach(a => { agentCards += renderFlowCard('agent-' + a.id, (a.icon||'') + ' ' + a.title, a.subtitle||null); });
  html += renderFlowBand('AI Agents (' + DATA.aiAgents.length + ')', agentCards, '#fff');

  // --- Skills ---
  html += renderFlowConnector('execute');
  let skillCards = '';
  DATA.skills.slice().sort((a,b) => a.title.localeCompare(b.title)).forEach(sk => { skillCards += renderFlowCard('skill-' + sk.id, (sk.icon||'') + ' ' + sk.title, sk.subtitle||null); });
  html += renderFlowBand('Skills (' + DATA.skills.length + ')', skillCards, '#fff');

  // --- Tools ---
  html += renderFlowConnector('use');
  let toolCards = '';
  DATA.realtools.slice().sort((a,b) => a.title.localeCompare(b.title)).forEach(t => { toolCards += renderFlowCard('realtool-' + t.id, (t.icon||'') + ' ' + t.title, t.subtitle||null); });
  html += renderFlowBand('Tools (' + DATA.realtools.length + ')', toolCards, '#fff');

  // --- Guidelines ---
  html += renderFlowConnector('follow');
  let guidelineCards = '';
  DATA.guidelines.slice().sort((a,b) => a.title.localeCompare(b.title)).forEach(g => { const items = g.items||[]; const preview = items.slice(0,3).map(i => typeof i === 'string' ? i : i.title||i.id).join(', ') + (items.length > 3 ? ' …' : ''); guidelineCards += renderFlowCard('guideline-' + g.id, (g.icon||'') + ' ' + g.title, preview || null); });
  html += renderFlowBand('Guidelines (' + DATA.guidelines.length + ')', guidelineCards, '#fff');

  // --- Rules ---
  const govCount = DATA.policies.length + DATA.guardrails.length;
  html += renderFlowConnector('adhere to');
  let govCards = '';
  const allRules = [
    ...DATA.policies.map(p => ({type:'policy', item:p})),
    ...DATA.guardrails.map(g => ({type:'guardrail', item:g}))
  ].sort((a,b) => a.item.title.localeCompare(b.item.title));
  allRules.forEach(({type, item}) => {
    const prefix = type === 'policy' ? 'policy-' : 'guardrail-';
    const typeLabel = type === 'policy' ? 'Policy' : 'Guardrail';
    govCards += renderFlowCard(prefix + item.id, (item.icon||'') + ' ' + item.title, typeLabel + ' · ' + (item.scope||'internal'), true);
  });
  html += renderFlowBand('Rules (' + govCount + ')', govCards, '#fff');

  html += '</div>';
  return html;
}

function renderMapFlow() {
  const flow = buildFlowData(mapSelectedCap);
  if (!flow) return '<div class="map-flow"><p>Capability not found.</p></div>';
  const cap = flow.capability;
  const stage = DATA.lifecycleStages.find(s => s.id === cap.stage);
  const stageColor = STAGE_COLORS[cap.stage] || '#475569';

  let html = '<div class="map-flow">';
  html += '<button class="map-back-btn" data-map-back>&larr; Back to full chart</button>';

  // 1. Capability band (expanded)
  html += '<div class="map-flow-band">';
  html += '<div class="map-flow-band-label">Capability' + (stage ? ' &middot; ' + esc(stage.title) : '') + '</div>';
  html += '<div class="map-flow-cards" style="background:' + stageColor + '18">';
  html += '<div class="map-flow-card-expanded">';
  html += '<div class="fce-title">' + esc(cap.title) + '</div>';
  html += '<div class="fce-desc">' + esc(cap.description) + '</div>';
  if (cap.domain) html += '<div class="fce-domain">' + esc(cap.domain) + '</div>';
  html += '</div></div></div>';

  // 2. Playbooks
  if (flow.playbooks.length) {
    html += renderFlowConnector('activate');
    let cards = '';
    flow.playbooks.forEach(pb => {
      cards += renderFlowCard('pb-' + pb.id, (pb.icon||'') + ' ' + pb.title, pb.description ? (pb.description.length > 60 ? pb.description.slice(0,60) + '…' : pb.description) : null);
    });
    html += renderFlowBand('Playbooks', cards, '#fff');
  }

  // 3. Agents
  if (flow.agents.length) {
    html += renderFlowConnector('mobilize');
    let cards = '';
    flow.agents.forEach(a => {
      cards += renderFlowCard('agent-' + a.id, (a.icon||'') + ' ' + a.title, a.subtitle||null);
    });
    html += renderFlowBand('AI Agents', cards, '#fff');
  }

  // 4. Skills
  if (flow.skills.length) {
    html += renderFlowConnector('execute');
    let cards = '';
    flow.skills.forEach(sk => {
      cards += renderFlowCard('skill-' + sk.id, (sk.icon||'') + ' ' + sk.title, sk.subtitle||null);
    });
    html += renderFlowBand('Skills', cards, '#fff');
  }

  // 5. Tools
  if (flow.tools.length) {
    html += renderFlowConnector('use');
    let cards = '';
    flow.tools.forEach(t => {
      cards += renderFlowCard('realtool-' + t.id, (t.icon||'') + ' ' + t.title, t.subtitle||null);
    });
    html += renderFlowBand('Tools', cards, '#fff');
  }

  // 6. Guidelines
  if (flow.guidelines.length) {
    html += renderFlowConnector('follow');
    let cards = '';
    flow.guidelines.forEach(g => {
      const gitems = g.items||[];
      const preview = gitems.slice(0,3).map(i => typeof i === 'string' ? i : i.title||i.id).join(', ') + (gitems.length > 3 ? ' …' : '');
      cards += renderFlowCard('guideline-' + g.id, (g.icon||'') + ' ' + g.title, preview || null);
    });
    html += renderFlowBand('Guidelines', cards, '#fff');
  }

  // 7. Rules
  if (flow.governance.length) {
    html += renderFlowConnector('adhere to');
    let cards = '';
    flow.governance.forEach(({type, item}) => {
      const prefix = type === 'policy' ? 'policy-' : 'guardrail-';
      const typeLabel = type === 'policy' ? 'Policy' : 'Guardrail';
      cards += renderFlowCard(prefix + item.id, (item.icon||'') + ' ' + item.title, typeLabel + ' · ' + (item.scope||'internal'));
    });
    html += renderFlowBand('Rules', cards, '#fff');
  }

  html += '</div>';
  return html;
}

function renderProcessView() {
  const {rows, phases} = PROCESS_DATA;
  let html = '<div class="process-outer"><table class="process-table"><thead><tr>';
  html += '<th class="pt-corner"></th>';
  phases.forEach(p => {
    if (visiblePhases.has(p.id)) {
      html += '<th class="pt-phase-header" style="background:' + p.headerColor + '" data-toggle-phase="' + p.id + '">'
        + (p.icon ? p.icon + ' ' : '') + esc(p.title) + '</th>';
    } else {
      html += '<th class="pt-collapsed-header" style="background:' + p.headerColor + '" data-toggle-phase="' + p.id + '">'
        + '<div class="pt-collapsed-label">' + (p.icon ? p.icon + ' ' : '') + esc(p.title) + '</div></th>';
    }
  });
  html += '</tr></thead><tbody>';
  rows.forEach(row => {
    const isVisible = visibleRows.has(row.key);
    if (!isVisible) {
      html += '<tr>';
      html += '<td class="pt-row-label collapsed" data-toggle-row="' + row.key + '">'
        + '<div class="pt-row-label-content"><span>' + esc(row.label) + '</span><span class="chevron">▶</span></div></td>';
      phases.forEach(p => {
        if (!visiblePhases.has(p.id)) {
          html += '<td class="pt-collapsed-cell"></td>';
        } else {
          html += '<td class="pt-row-collapsed-filler"></td>';
        }
      });
      html += '</tr>';
      return;
    }
    html += '<tr>';
    html += '<td class="pt-row-label" data-toggle-row="' + row.key + '">'
      + '<div class="pt-row-label-content"><span>' + esc(row.label) + '</span><span class="chevron">▼</span></div></td>';
    phases.forEach(p => {
      if (!visiblePhases.has(p.id)) {
        html += '<td class="pt-collapsed-cell"></td>';
        return;
      }
      const val = p[row.key];
      html += '<td style="background:' + p.bgColor + '">';
      if (row.key === 'objective' && p.focus) {
        html += '<p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:4px">' + esc(p.focus) + '</p>';
      }
      if (!val) {
        html += '<span style="color:#cbd5e1">—</span>';
      } else if (typeof val === 'string') {
        html += '<p class="pt-cell-text">' + esc(val) + '</p>';
      } else if (Array.isArray(val)) {
        html += '<ul class="pt-cell-items">';
        val.forEach(item => { html += '<li>' + esc(item) + '</li>'; });
        html += '</ul>';
      } else if (typeof val === 'object') {
        if (val.text) html += '<p class="pt-cell-text">' + esc(val.text) + '</p>';
        if (val.items && val.items.length) {
          html += '<ul class="pt-cell-items">';
          val.items.forEach(item => { html += '<li>' + esc(item) + '</li>'; });
          html += '</ul>';
        }
      }
      html += '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function bindEvents() {
  document.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', (e) => { e.preventDefault(); viewMode = el.dataset.view; render(); });
  });
  document.querySelectorAll('[data-density]').forEach(el => {
    el.addEventListener('click', () => { mapDensity = el.dataset.density; render(); });
  });
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => { selectedId = el.dataset.id; render(); });
  });
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedId = el.dataset.nav;
      const prefix = selectedId.split('-')[0];
      const catMap = {agent:'aiAgents',skill:'skills',guideline:'guidelines',pb:'playbooks',policy:'policies',guardrail:'guardrails',realtool:'realtools',infra:'orchestration',ka:'knowledgeAssets'};
      if (catMap[prefix]) expandedCategories.add(catMap[prefix]);
      if (prefix === 'cap') {
        const cap = DATA.capabilities.find(c => c.id === selectedId);
        if (cap) expandedCategories.add('cap-' + cap.stage);
      }
      render();
      setTimeout(() => {
        const item = document.querySelector('.sidebar-item.selected');
        if (item) item.scrollIntoView({behavior:'smooth',block:'nearest'});
      }, 50);
    });
  });
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.toggle;
      if (expandedCategories.has(key)) expandedCategories.delete(key);
      else expandedCategories.add(key);
      render();
    });
  });
  document.querySelectorAll('[data-toggle-row]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.toggleRow;
      if (visibleRows.has(key)) visibleRows.delete(key);
      else visibleRows.add(key);
      render();
    });
  });
  document.querySelectorAll('[data-toggle-phase]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = el.dataset.togglePhase;
      if (visiblePhases.has(key)) visiblePhases.delete(key);
      else visiblePhases.add(key);
      render();
    });
  });
  // Map: capability picker clicks
  document.querySelectorAll('[data-cap-pick]').forEach(el => {
    el.addEventListener('click', () => {
      mapSelectedCap = el.dataset.capPick;
      mapExpandedCard = null;
      render();
      // Scroll to top of map
      const outer = document.querySelector('.map-outer');
      if (outer) outer.scrollTop = 0;
    });
  });
  // Map: back button
  document.querySelectorAll('[data-map-back]').forEach(el => {
    el.addEventListener('click', () => {
      mapSelectedCap = null;
      mapExpandedCard = null;
      render();
    });
  });
  // Search
  function selectSearchResult(navId) {
    selectedId = navId;
    const prefix = navId.split('-')[0];
    const catMap = {agent:'aiAgents',skill:'skills',guideline:'guidelines',pb:'playbooks',policy:'policies',guardrail:'guardrails',realtool:'realtools',infra:'orchestration',ka:'knowledgeAssets'};
    if (catMap[prefix]) expandedCategories.add(catMap[prefix]);
    if (prefix === 'cap') {
      const cap = DATA.capabilities.find(c => c.id === navId);
      if (cap) expandedCategories.add('cap-' + cap.stage);
    }
    searchQuery = ''; searchResults = []; searchActiveIdx = -1;
    render();
    // Scroll sidebar to show the selected item
    setTimeout(() => {
      const el = document.querySelector('.sidebar-item.selected');
      if (el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }, 50);
  }
  const searchInput = document.getElementById('fi-search');
  const searchClear = document.getElementById('fi-search-clear');
  if (searchInput) {
    if (searchQuery) {
      searchInput.focus();
      searchInput.setSelectionRange(searchQuery.length, searchQuery.length);
    }
    let debounceTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        searchQuery = searchInput.value;
        searchResults = searchEntities(searchQuery);
        searchActiveIdx = -1;
        render();
      }, 150);
    });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (searchResults.length) { searchActiveIdx = Math.min(searchActiveIdx + 1, searchResults.length - 1); render(); }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (searchResults.length) { searchActiveIdx = Math.max(searchActiveIdx - 1, -1); render(); }
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (searchActiveIdx >= 0 && searchResults[searchActiveIdx]) {
          selectSearchResult(searchResults[searchActiveIdx].navId);
        }
      } else if (e.key === 'Escape') {
        searchQuery = ''; searchResults = []; searchActiveIdx = -1;
        render();
      }
    });
  }
  if (searchClear) {
    searchClear.addEventListener('click', () => {
      searchQuery = ''; searchResults = []; searchActiveIdx = -1; render();
    });
  }
  document.querySelectorAll('[data-search-nav]').forEach(el => {
    el.addEventListener('click', () => { selectSearchResult(el.dataset.searchNav); });
  });
  // Close search dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (searchQuery && !e.target.closest('.search-bar')) {
      searchQuery = ''; searchResults = []; searchActiveIdx = -1; render();
    }
  }, {once: true});
  // Map: flow card click navigates to Functions Inventory detail
  document.querySelectorAll('[data-flow-expand]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.flowExpand;
      selectedId = id;
      viewMode = 'studio';
      const prefix = id.split('-')[0];
      const catMap = {agent:'aiAgents',skill:'skills',guideline:'guidelines',pb:'playbooks',policy:'policies',guardrail:'guardrails',realtool:'realtools',infra:'orchestration',ka:'knowledgeAssets'};
      if (catMap[prefix]) expandedCategories.add(catMap[prefix]);
      if (prefix === 'cap') {
        const cap = DATA.capabilities.find(c => c.id === id);
        if (cap) expandedCategories.add('cap-' + cap.stage);
      }
      render();
      setTimeout(() => {
        const sel = document.querySelector('.sidebar-item.selected');
        if (sel) sel.scrollIntoView({behavior:'smooth',block:'nearest'});
      }, 50);
    });
  });
}

render();
</script>
